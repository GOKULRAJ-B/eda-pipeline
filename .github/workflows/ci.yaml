name: EDA Pipeline CI

on:
  push:
    branches: [ "master" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run pipeline test
      run: python main.py data/raw_dataset.csv


    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin


    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eda-pipeline:latest .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/eda-pipeline:latest